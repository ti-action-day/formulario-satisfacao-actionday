<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/assets/img/favicon.png" sizes="32x32">
  <title>Pesquisa de Satisfação | Action Day</title>
  <meta name="description" content="Pesquisa de satisfação referente ao planejamento apresentado — Action Day Digital.">
  <link rel="stylesheet" href="/assets/css/busl.css" />
</head>

<body>
  <main class="container">

    <div class="logo">
      <img src="/assets/img/logo.png" alt="Logo Action Day Digital">
    </div>

    <h1>Pesquisa de satisfação referente ao planejamento apresentado!</h1>

    <form id="feedbackForm">

      <!-- 1 -->
      <div class="question">
        <label class="q-title">
          1. A apresentação deixou claro como podemos ajudar a sua empresa nos próximos meses?
        </label>

        <div class="scale-grid" role="radiogroup" aria-label="Clareza da apresentação">
          <div class="scale-end left">Muito pouco claro</div>

          <div class="scale-items">
            <label class="scale-item csat">
              <input type="radio" name="q1_clareza" value="1" required>
              <span class="dot-ui" aria-hidden="true"></span>
              <span class="num" aria-hidden="true">1</span>
            </label>

            <label class="scale-item csat">
              <input type="radio" name="q1_clareza" value="2">
              <span class="dot-ui" aria-hidden="true"></span>
              <span class="num" aria-hidden="true">2</span>
            </label>

            <label class="scale-item csat">
              <input type="radio" name="q1_clareza" value="3">
              <span class="dot-ui" aria-hidden="true"></span>
              <span class="num" aria-hidden="true">3</span>
            </label>

            <label class="scale-item csat">
              <input type="radio" name="q1_clareza" value="4">
              <span class="dot-ui" aria-hidden="true"></span>
              <span class="num" aria-hidden="true">4</span>
            </label>

            <label class="scale-item csat">
              <input type="radio" name="q1_clareza" value="5">
              <span class="dot-ui" aria-hidden="true"></span>
              <span class="num" aria-hidden="true">5</span>
            </label>
          </div>

          <div class="scale-end right">Muito claro</div>
        </div>
      </div>

      <!-- 2 -->
      <div class="question">
        <label class="q-title">
          2. O conteúdo apresentado esteve alinhado às prioridades e desafios atuais do seu negócio neste momento?
        </label>

        <div class="scale-grid" role="radiogroup" aria-label="Alinhamento do conteúdo">
          <div class="scale-end left">Nada alinhado</div>

          <div class="scale-items">
            <label class="scale-item csat">
              <input type="radio" name="q2_alinhamento" value="1" required>
              <span class="dot-ui" aria-hidden="true"></span>
              <span class="num" aria-hidden="true">1</span>
            </label>

            <label class="scale-item csat">
              <input type="radio" name="q2_alinhamento" value="2">
              <span class="dot-ui" aria-hidden="true"></span>
              <span class="num" aria-hidden="true">2</span>
            </label>

            <label class="scale-item csat">
              <input type="radio" name="q2_alinhamento" value="3">
              <span class="dot-ui" aria-hidden="true"></span>
              <span class="num" aria-hidden="true">3</span>
            </label>

            <label class="scale-item csat">
              <input type="radio" name="q2_alinhamento" value="4">
              <span class="dot-ui" aria-hidden="true"></span>
              <span class="num" aria-hidden="true">4</span>
            </label>

            <label class="scale-item csat">
              <input type="radio" name="q2_alinhamento" value="5">
              <span class="dot-ui" aria-hidden="true"></span>
              <span class="num" aria-hidden="true">5</span>
            </label>
          </div>

          <div class="scale-end right">Totalmente alinhado</div>
        </div>
      </div>

      <!-- 3 -->
      <div class="question">
        <label class="q-title">
          3. Após a apresentação, qual é o seu nível de confiança na Action Day para apoiar decisões estratégicas do seu negócio?
        </label>

        <div class="scale-grid" role="radiogroup" aria-label="Confiança na Action Day">
          <div class="scale-end left">Nenhuma confiança</div>

          <div class="scale-items">
            <label class="scale-item csat">
              <input type="radio" name="q3_confianca" value="1" required>
              <span class="dot-ui" aria-hidden="true"></span>
              <span class="num" aria-hidden="true">1</span>
            </label>

            <label class="scale-item csat">
              <input type="radio" name="q3_confianca" value="2">
              <span class="dot-ui" aria-hidden="true"></span>
              <span class="num" aria-hidden="true">2</span>
            </label>

            <label class="scale-item csat">
              <input type="radio" name="q3_confianca" value="3">
              <span class="dot-ui" aria-hidden="true"></span>
              <span class="num" aria-hidden="true">3</span>
            </label>

            <label class="scale-item csat">
              <input type="radio" name="q3_confianca" value="4">
              <span class="dot-ui" aria-hidden="true"></span>
              <span class="num" aria-hidden="true">4</span>
            </label>

            <label class="scale-item csat">
              <input type="radio" name="q3_confianca" value="5">
              <span class="dot-ui" aria-hidden="true"></span>
              <span class="num" aria-hidden="true">5</span>
            </label>
          </div>

          <div class="scale-end right">Confiança total</div>
        </div>
      </div>

      <!-- 4 -->
      <div class="question">
        <label class="q-title">
          4. Existe algum ponto que você gostaria que fosse explicado com mais profundidade?
        </label>

        <textarea name="q4_aprofundar" placeholder="Escreva aqui..."></textarea>
      </div>

      <!-- 5 -->
      <div class="question">
        <label class="q-title">
          5. Como você descreve sua sensação após a reunião?
        </label>

        <div class="radio-list">
          <label class="radio-card card-green">
            <input type="radio" name="q5_sensacao" value="Mais seguro(a) sobre os próximos passos" required>
            <span>Mais seguro(a) sobre os próximos passos</span>
          </label>

          <label class="radio-card card-yellow">
            <input type="radio" name="q5_sensacao" value="Indiferente">
            <span>Indiferente</span>
          </label>

          <label class="radio-card card-orange">
            <input type="radio" name="q5_sensacao" value="Ainda com dúvidas importantes">
            <span>Ainda com dúvidas importantes</span>
          </label>

          <label class="radio-card card-red">
            <input type="radio" name="q5_sensacao" value="Menos seguro(a) do que antes">
            <span>Menos seguro(a) do que antes</span>
          </label>
        </div>
      </div>

      <button id="submitBtn" type="submit">Enviar Feedback</button>
      <div id="feedbackMsg" class="feedback"></div>

    </form>
  </main>

  <footer class="footer">
    <p>© 2026 <strong>Action Day Digital</strong> — Estratégia, Tecnologia e Crescimento 🚀</p>
    <p>
      <a href="https://actiondaydigital.com.br" target="_blank" rel="noopener noreferrer">
        actiondaydigital.com.br
      </a>
    </p>
  </footer>

  <script src="/assets/js/busl.js"></script>
</body>
</html>
